<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mein Tool-Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --bg2: #17171a;
    --bg3: #1e1e22;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8e8ec;
    --text2: #888896;
    --text3: #55555f;
    --accent: #7c6af7;
    --accent2: #a599ff;
    --accent-bg: rgba(124,106,247,0.12);
    --accent-border: rgba(124,106,247,0.35);
    --green: #3ecf8e;
    --green-bg: rgba(62,207,142,0.1);
    --sidebar: 240px;
    --radius: 10px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); overflow: hidden; }

  /* ── LAYOUT ── */
  .app { display: flex; height: 100vh; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar);
    min-width: var(--sidebar);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 14px;
    font-family: var(--mono);
  }

  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
  #search {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 7px;
    padding: 7px 10px 7px 30px;
    font-family: var(--font);
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  #search::placeholder { color: var(--text3); }
  #search:focus { border-color: var(--accent-border); }

  .sidebar-nav { flex: 1; overflow-y: auto; padding: 10px 8px; }
  .sidebar-nav::-webkit-scrollbar { width: 3px; }
  .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .nav-section { margin-bottom: 6px; }

  .nav-all {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.15s;
    margin-bottom: 10px;
  }
  .nav-all:hover { background: var(--bg3); color: var(--text); }
  .nav-all.active { background: var(--accent-bg); color: var(--accent2); border: 1px solid var(--accent-border); }
  .nav-all .count { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--text3); }

  .cat-header {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 7px;
    transition: background 0.15s;
    user-select: none;
  }
  .cat-header:hover { background: var(--bg3); }
  .cat-header .arrow { margin-left: auto; transition: transform 0.2s; font-size: 10px; }
  .cat-header.collapsed .arrow { transform: rotate(-90deg); }

  .cat-color {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }

  .cat-items { overflow: hidden; }

  .nav-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px 6px 26px;
    border-radius: 7px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.15s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--accent-bg); color: var(--accent2); }
  .nav-item .sub-count { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--text3); flex-shrink: 0; }

  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
  }

  /* ── MAIN ── */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

  .topbar {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg2);
  }

  .breadcrumb { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
  .breadcrumb .sep { color: var(--text3); }
  .breadcrumb .current { color: var(--text); font-weight: 500; }

  .view-toggle { margin-left: auto; display: flex; gap: 3px; }
  .vbtn {
    background: none; border: 1px solid transparent;
    border-radius: 6px; padding: 5px 8px;
    color: var(--text3); cursor: pointer;
    transition: all 0.15s;
  }
  .vbtn:hover { color: var(--text2); border-color: var(--border2); }
  .vbtn.active { color: var(--accent2); background: var(--accent-bg); border-color: var(--accent-border); }

  .content-area { flex: 1; overflow-y: auto; padding: 20px; }
  .content-area::-webkit-scrollbar { width: 4px; }
  .content-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* ── GRID VIEW ── */
  .tool-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }

  .tool-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .tool-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--cat-color, var(--accent));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .tool-card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .tool-card:hover::before { opacity: 1; }
  .tool-card.active-card { border-color: var(--accent-border); background: var(--accent-bg); }

  .card-emoji { font-size: 22px; margin-bottom: 10px; display: block; }
  .card-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
  .card-cat { font-size: 11px; color: var(--text3); font-family: var(--mono); }

  /* ── LIST VIEW ── */
  .tool-list { display: flex; flex-direction: column; gap: 4px; }
  .tool-list-item {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 14px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tool-list-item:hover { border-color: var(--border2); }
  .tool-list-item.active-card { border-color: var(--accent-border); background: var(--accent-bg); }
  .list-emoji { font-size: 18px; width: 28px; text-align: center; flex-shrink: 0; }
  .list-name { font-size: 13px; font-weight: 500; flex: 1; }
  .list-cat { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .list-open { font-size: 11px; color: var(--text3); margin-left: auto; }

  /* ── IFRAME PANEL ── */
  .iframe-panel {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
    flex-direction: column;
  }
  .iframe-panel.open { display: flex; }

  .iframe-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .iframe-title { font-size: 14px; font-weight: 500; flex: 1; }
  .iframe-url { font-size: 11px; color: var(--text3); font-family: var(--mono); flex: 2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .iframe-actions { display: flex; gap: 8px; }
  .ibtn {
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 6px; padding: 5px 10px;
    font-size: 12px; color: var(--text2);
    cursor: pointer; font-family: var(--font);
    transition: all 0.15s; white-space: nowrap;
  }
  .ibtn:hover { color: var(--text); border-color: var(--border2); }
  .ibtn.close-btn { color: var(--text2); }
  .ibtn.close-btn:hover { color: #ff6b6b; border-color: rgba(255,107,107,0.3); }

  iframe#tool-frame {
    flex: 1;
    border: none;
    background: #fff;
  }

  /* ── EMPTY ── */
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--text3);
  }
  .empty .big { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* ── SECTION TITLES ── */
  .section-label {
    font-size: 11px; font-weight: 500;
    color: var(--text3); letter-spacing: 0.08em;
    text-transform: uppercase; font-family: var(--mono);
    margin: 0 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .section-block { margin-bottom: 24px; }

  @media (max-width: 600px) {
    .sidebar { width: 190px; min-width: 190px; }
    .tool-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }
</style>
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">⬡ Tool-Portal</div>
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search" placeholder="Suchen…">
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer" id="sidebar-footer"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="breadcrumb" id="breadcrumb">
        <span class="current">Alle Tools</span>
      </div>
      <div class="view-toggle">
        <button class="vbtn active" id="btn-grid" title="Rasteransicht" onclick="setView('grid')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
        <button class="vbtn" id="btn-list" title="Listenansicht" onclick="setView('list')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
      </div>
    </div>
    <div class="content-area" id="content-area"></div>
  </main>
</div>

<!-- IFRAME PANEL -->
<div class="iframe-panel" id="iframe-panel">
  <div class="iframe-header">
    <span class="iframe-title" id="iframe-title"></span>
    <span class="iframe-url" id="iframe-url"></span>
    <div class="iframe-actions">
      <button class="ibtn" onclick="openInTab()">↗ Neuer Tab</button>
      <button class="ibtn close-btn" onclick="closeFrame()">✕ Schließen</button>
    </div>
  </div>
  <iframe id="tool-frame" src="about:blank" allowfullscreen></iframe>
</div>

<script>
// ─────────────────────────────────────────────
//  FARBEN PRO KATEGORIE (automatisch vergeben)
// ─────────────────────────────────────────────
const COLORS = [
  '#7c6af7','#3ecf8e','#f5a623','#e95b5b',
  '#38b2f7','#b06ef5','#3dd6c8','#f57c38',
  '#e06f9d','#6db8f5','#a3e635','#fb923c'
];

let allTools = [];
let categories = {};
let currentFilter = '__all__';
let currentView = 'grid';
let colorMap = {};
let colorIdx = 0;

function getCatColor(cat) {
  if (!colorMap[cat]) { colorMap[cat] = COLORS[colorIdx++ % COLORS.length]; }
  return colorMap[cat];
}

// ─────────────────────────────────────────────
//  LADE TOOLS AUS tools.json
// ─────────────────────────────────────────────
async function loadTools() {
  try {
    const r = await fetch('tools.json');
    if (!r.ok) throw new Error('tools.json nicht gefunden');
    const data = await r.json();
    allTools = data.tools || [];
    buildCategories();
    renderSidebar();
    renderContent(allTools);
  } catch(e) {
    document.getElementById('content-area').innerHTML = `
      <div class="empty">
        <div class="big">📂</div>
        <p style="color:#e95b5b;margin-bottom:8px;">tools.json konnte nicht geladen werden.</p>
        <p>Stelle sicher, dass <code style="font-family:var(--mono);font-size:12px;color:#7c6af7">tools.json</code> im gleichen Ordner liegt.</p>
      </div>`;
  }
}

function buildCategories() {
  categories = {};
  allTools.forEach(t => {
    const cat = t.category || 'Sonstiges';
    const sub = t.subcategory || '';
    if (!categories[cat]) categories[cat] = {};
    if (sub) {
      if (!categories[cat][sub]) categories[cat][sub] = [];
      categories[cat][sub].push(t);
    } else {
      if (!categories[cat]['__none__']) categories[cat]['__none__'] = [];
      categories[cat]['__none__'].push(t);
    }
    getCatColor(cat);
  });
}

// ─────────────────────────────────────────────
//  SIDEBAR
// ─────────────────────────────────────────────
let collapsedCats = {};

function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  const footer = document.getElementById('sidebar-footer');
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = q ? allTools.filter(t => t.name.toLowerCase().includes(q) || (t.category||'').toLowerCase().includes(q)) : allTools;

  let html = `<div class="nav-section">
    <div class="nav-all ${currentFilter==='__all__'?'active':''}" onclick="filterAll()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Alle Tools
      <span class="count">${filtered.length}</span>
    </div>
  </div>`;

  // Kategorien aus gefilterten Tools
  const filteredCats = {};
  filtered.forEach(t => {
    const cat = t.category || 'Sonstiges';
    const sub = t.subcategory || '';
    if (!filteredCats[cat]) filteredCats[cat] = {};
    if (!filteredCats[cat][sub]) filteredCats[cat][sub] = 0;
    filteredCats[cat][sub]++;
  });

  Object.keys(filteredCats).sort().forEach(cat => {
    const color = getCatColor(cat);
    const collapsed = collapsedCats[cat];
    const subs = filteredCats[cat];
    const total = Object.values(subs).reduce((a,b) => a+b, 0);
    const hasReal = Object.keys(subs).some(s => s !== '__none__');
    const isActiveCat = currentFilter === '__cat__' + cat;

    html += `<div class="nav-section">
      <div class="cat-header ${collapsed?'collapsed':''}" onclick="toggleCat('${esc(cat)}')">
        <span class="cat-color" style="background:${color}"></span>
        ${esc(cat)}
        <span class="arrow">▾</span>
      </div>`;

    if (!collapsed) {
      html += `<div class="cat-items">`;

      // Zeige "Alle in Kategorie" nur wenn es auch Unterkategorien gibt
      if (hasReal) {
        html += `<div class="nav-item ${isActiveCat?'active':''}" onclick="filterCat('${esc(cat)}')">
          <span>Alle in Kategorie</span>
          <span class="sub-count">${total}</span>
        </div>`;
        Object.keys(subs).sort().forEach(sub => {
          if (sub === '') return;
          const key = cat + '||' + sub;
          html += `<div class="nav-item ${currentFilter===key?'active':''}" onclick="filterSub('${esc(cat)}','${esc(sub)}')">
            ${esc(sub)} <span class="sub-count">${subs[sub]}</span>
          </div>`;
        });
      } else {
        // Keine Unterkategorien – direkt klickbar ohne "Alle in Kategorie"
        html += `<div class="nav-item ${isActiveCat?'active':''}" onclick="filterCat('${esc(cat)}')">
          <span>${esc(cat)}</span>
          <span class="sub-count">${total}</span>
        </div>`;
      }

      html += `</div>`;
    }
    html += `</div>`;
  });

  nav.innerHTML = html;
  footer.textContent = `${allTools.length} Tools geladen`;
}

function esc(s) { return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function toggleCat(cat) {
  collapsedCats[cat] = !collapsedCats[cat];
  renderSidebar();
}

function filterAll() {
  currentFilter = '__all__';
  updateBreadcrumb('Alle Tools');
  renderContent(getSearchFiltered(allTools));
  renderSidebar();
}

function filterCat(cat) {
  currentFilter = '__cat__' + cat;
  updateBreadcrumb(cat);
  renderContent(getSearchFiltered(allTools.filter(t => (t.category||'Sonstiges') === cat)));
  renderSidebar();
}

function filterSub(cat, sub) {
  currentFilter = cat + '||' + sub;
  updateBreadcrumb(cat, sub);
  renderContent(getSearchFiltered(allTools.filter(t => (t.category||'Sonstiges') === cat && (t.subcategory||'') === sub)));
  renderSidebar();
}

function getSearchFiltered(list) {
  const q = document.getElementById('search').value.toLowerCase();
  if (!q) return list;
  return list.filter(t => t.name.toLowerCase().includes(q) || (t.category||'').toLowerCase().includes(q) || (t.subcategory||'').toLowerCase().includes(q));
}

function updateBreadcrumb(cat, sub) {
  const bc = document.getElementById('breadcrumb');
  if (sub) {
    bc.innerHTML = `<span>${cat}</span><span class="sep">›</span><span class="current">${sub}</span>`;
  } else {
    bc.innerHTML = `<span class="current">${cat}</span>`;
  }
}

// ─────────────────────────────────────────────
//  CONTENT
// ─────────────────────────────────────────────
function renderContent(tools) {
  const area = document.getElementById('content-area');
  if (!tools.length) {
    area.innerHTML = `<div class="empty"><div class="big">🔍</div><p>Keine Tools gefunden.</p></div>`;
    return;
  }

  if (currentView === 'grid') {
    area.innerHTML = `<div class="tool-grid">${tools.map(t => cardHTML(t)).join('')}</div>`;
  } else {
    // Liste, gruppiert nach Kategorie wenn "Alle"
    if (currentFilter === '__all__') {
      const bycat = {};
      tools.forEach(t => {
        const c = t.category || 'Sonstiges';
        if (!bycat[c]) bycat[c] = [];
        bycat[c].push(t);
      });
      area.innerHTML = Object.keys(bycat).sort().map(cat =>
        `<div class="section-block">
          <div class="section-label">${cat}</div>
          <div class="tool-list">${bycat[cat].map(t => listHTML(t)).join('')}</div>
        </div>`
      ).join('');
    } else {
      area.innerHTML = `<div class="tool-list">${tools.map(t => listHTML(t)).join('')}</div>`;
    }
  }
}

function cardHTML(t) {
  const color = getCatColor(t.category || 'Sonstiges');
  return `<div class="tool-card" style="--cat-color:${color}" onclick="openTool(${JSON.stringify(JSON.stringify(t))})">
    <span class="card-emoji">${t.emoji || '🔧'}</span>
    <div class="card-name">${t.name}</div>
    <div class="card-cat">${t.category||''}${t.subcategory?' › '+t.subcategory:''}</div>
  </div>`;
}

function listHTML(t) {
  return `<div class="tool-list-item" onclick="openTool(${JSON.stringify(JSON.stringify(t))})">
    <span class="list-emoji">${t.emoji || '🔧'}</span>
    <span class="list-name">${t.name}</span>
    <span class="list-cat">${t.category||''}${t.subcategory?' › '+t.subcategory:''}</span>
    <span class="list-open">Öffnen →</span>
  </div>`;
}

function setView(v) {
  currentView = v;
  document.getElementById('btn-grid').classList.toggle('active', v==='grid');
  document.getElementById('btn-list').classList.toggle('active', v==='list');
  // Re-render mit aktuellem Filter
  const q = document.getElementById('search').value.toLowerCase();
  let list = allTools;
  if (currentFilter !== '__all__') {
    if (currentFilter.startsWith('__cat__')) {
      const cat = currentFilter.slice(7);
      list = list.filter(t => (t.category||'Sonstiges') === cat);
    } else {
      const [cat, sub] = currentFilter.split('||');
      list = list.filter(t => (t.category||'Sonstiges') === cat && (t.subcategory||'') === sub);
    }
  }
  if (q) list = list.filter(t => t.name.toLowerCase().includes(q));
  renderContent(list);
}

// ─────────────────────────────────────────────
//  SEARCH
// ─────────────────────────────────────────────
document.getElementById('search').addEventListener('input', () => {
  currentFilter = '__all__';
  updateBreadcrumb('Alle Tools');
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = q ? allTools.filter(t =>
    t.name.toLowerCase().includes(q) ||
    (t.category||'').toLowerCase().includes(q) ||
    (t.subcategory||'').toLowerCase().includes(q)
  ) : allTools;
  renderSidebar();
  renderContent(filtered);
});

// ─────────────────────────────────────────────
//  IFRAME
// ─────────────────────────────────────────────
let currentTool = null;

function openTool(jsonStr) {
  const t = JSON.parse(jsonStr);
  currentTool = t;
  document.getElementById('iframe-title').textContent = (t.emoji||'🔧') + '  ' + t.name;
  document.getElementById('iframe-url').textContent = t.file;
  document.getElementById('iframe-panel').classList.add('open');

  const frame = document.getElementById('tool-frame');
  const old = document.getElementById('iframe-blocked-msg');
  if (old) old.remove();
  frame.style.display = 'block';
  frame.src = t.file;

  frame.onerror = function() { showBlockedMsg(t); };
  setTimeout(() => {
    try {
      if (frame.contentDocument && frame.contentDocument.body &&
          frame.contentDocument.body.innerHTML === '') showBlockedMsg(t);
    } catch(e) { /* cross-origin ok */ }
  }, 2500);
}

function showBlockedMsg(t) {
  const frame = document.getElementById('tool-frame');
  frame.style.display = 'none';
  const old = document.getElementById('iframe-blocked-msg');
  if (old) old.remove();
  const msg = document.createElement('div');
  msg.id = 'iframe-blocked-msg';
  msg.style.cssText = 'flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#888896;background:#0f0f11;';
  msg.innerHTML = `
    <div style="font-size:40px">🔒</div>
    <div style="font-size:14px;text-align:center;line-height:1.6;">Diese Datei kann nicht eingebettet werden.<br>Bitte im neuen Tab öffnen.</div>
    <button onclick="openInTab()" style="background:#7c6af7;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;cursor:pointer;font-family:inherit;">↗ Im neuen Tab öffnen</button>
  `;
  document.getElementById('iframe-panel').appendChild(msg);
}

function closeFrame() {
  document.getElementById('iframe-panel').classList.remove('open');
  document.getElementById('tool-frame').src = 'about:blank';
  document.getElementById('tool-frame').style.display = 'block';
  const old = document.getElementById('iframe-blocked-msg');
  if (old) old.remove();
  currentTool = null;
}

function openInTab() {
  if (currentTool) window.open(currentTool.file, '_blank');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeFrame();
});

// ─────────────────────────────────────────────
//  START
// ─────────────────────────────────────────────
loadTools();
</script>
</body>
</html>
